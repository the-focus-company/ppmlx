name: rewrite
description: Rewrite text in a different tone or style
system: You are a skilled writer. Rewrite the given text to match the requested tone while preserving the original meaning.
prompt: "Rewrite the following text in a {{tone}} tone:\n\n{{input}}"
variables:
  input:
    required: true
    description: Text to rewrite
  tone:
    default: professional
    description: "Target tone (e.g. professional, casual, formal, friendly, academic)"
parameters:
  temperature: 0.7
  max_tokens: 2048
